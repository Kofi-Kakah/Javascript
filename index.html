<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Counter</title>
</head>
<body>
    <div class="container">
        <div id="chl-container">
            
        <h1>Counter</h1>
            
        <p id="counter"><strong style="color: aqua;">Count:</strong> 0</p>
            
        <button id="increment">Increment</button>
        <button id="decrement">Decrement</button>
        <button id="reset">Reset</button><hr>
            
        <p>Reset Times: <span id="reset-times">0</span></p>
        <p>Decrement Times: <span id="decrement-times">0</span></p>
        <p>Increment Times: <span id="increment-times">0</span></p>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
